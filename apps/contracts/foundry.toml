[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
gas_reports = ["Market", "CollateralVault", "OracleSwarm", "MarketFactory"]
fs_permissions = [{ access = "read-write", path = "./" }]

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 32 }
verbosity = 4

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
mantle_sepolia = "${MANTLE_SEPOLIA_RPC_URL}"

[etherscan]
mantle_sepolia = { key = "${MANTLE_SEPOLIA_EXPLORER_API_KEY}", url = "https://api-sepolia.mantlescan.xyz/api" }
